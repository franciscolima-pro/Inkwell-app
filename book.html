<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="/src/css/style.css">
</head>
    <body>

        <main class="container">

            <button id="back-button">
                ← Back to Home
            </button>

            <section class="book-details">

                <h1 id="book-title"></h1>

                <p id="book-description"></p>

                <small id="book-visibility"></small>

            </section>

            <hr>

            <section class="chapter-form-section">

                <h2>Create Chapter</h2>

                <form id="chapter-form">

                    <label for="chapter-title">
                        Title
                    </label>

                    <input
                        id="chapter-title"
                        type="text"
                        placeholder="Chapter title"
                        required
                    >

                    <label for="chapter-order">
                        Order
                    </label>

                    <input
                        id="chapter-order"
                        type="number"
                        min="1"
                        value="1"
                    >

                    <button type="submit">
                        Save Chapter
                    </button>

                </form>

            </section>

            <hr>

            <section class="chapters-section">

                <h2>Chapters</h2>

                <div id="chapters-list" class="chapters-list">

                </div>

            </section>

        </main>

        <script type="module" src="/src/book.js"></script>

    </body>
</html>
